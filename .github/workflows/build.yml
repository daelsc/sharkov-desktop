name: Build Desktop App

on:
  push:
    branches:
      - main
      - feature/per-process-audio
      - feature/nvenc-hardware-encoding
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools for node-gyp
        run: pip install setuptools

      - name: Install root dependencies
        run: npm install
        env:
          CUSTOM_ELECTRON_SKIP: '1'

      - name: Install custom Electron (NVENC patched)
        run: node scripts/install-custom-electron.js

      - name: Install native addon dependencies
        run: npm install
        working-directory: native

      - name: Build native addon
        run: npx node-gyp rebuild --arch=x64
        working-directory: native

      - name: Build TypeScript
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace packaged Electron with NVENC build
        run: |
          $src = "node_modules\electron\dist"
          $dst = "out\win-unpacked"
          Copy-Item "$src\electron.exe" "$dst\Sharkord.exe" -Force
          Get-ChildItem "$src\*.dll" | Copy-Item -Destination "$dst" -Force
          Get-ChildItem "$src\*.bin" | Copy-Item -Destination "$dst" -Force
          Get-ChildItem "$src\*.pak" | Copy-Item -Destination "$dst" -Force
          Get-ChildItem "$src\*.dat" | Copy-Item -Destination "$dst" -Force
          if (Test-Path "$src\locales") { Get-ChildItem "$src\locales\*" | Copy-Item -Destination "$dst\locales" -Force }
          if (Test-Path "$src\resources\electron.asar") { Copy-Item "$src\resources\electron.asar" "$dst\resources\electron.asar" -Force }
          Write-Host "Replaced Electron with NVENC patched build (v39.2.16-qp20)"

      - name: Repackage portable exe with custom Electron
        run: npx electron-builder --win portable --x64 --prepackaged out/win-unpacked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sharkorddesktop-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: |
            out/*.exe
            out/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          pattern: sharkorddesktop-*

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            *.exe
            *.zip
